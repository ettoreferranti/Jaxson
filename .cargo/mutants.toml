# cargo-mutants configuration — https://mutants.rs/
#
# Mutation testing grades test quality: it injects small faults ("mutants") and
# checks that some test fails. Surviving mutants reveal weak assertions. We require
# the behavioral core to catch every viable mutant (see docs/DEVELOPMENT.md).

# Generous timeouts so slow/loaded CI runners don't report false "timeout" results.
minimum_test_timeout = 60
timeout_multiplier = 5.0
