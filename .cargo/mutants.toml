# cargo-mutants configuration — https://mutants.rs/
#
# Mutation testing grades test quality: it injects small faults ("mutants") and
# checks that some test fails. Surviving mutants reveal weak assertions. We require
# the behavioral core to catch every viable mutant (see docs/DEVELOPMENT.md).

# Generous timeouts so slow/loaded CI runners don't report false "timeout" results.
minimum_test_timeout = 60
timeout_multiplier = 5.0

# Feature-gated native backends build heavy C deps and are covered by their own tests
# / on-device runs. cargo-mutants ignores cfg-gating (it would report phantom "missed"
# mutants for code not compiled in the default build), so exclude them to keep the
# mutation score meaningful for the always-compiled pure core.
exclude_globs = [
    "crates/jaxson-llm/src/backends/llama.rs",
    "crates/jaxson-memory/src/sqlite.rs",
    # Rendering: pixel-drawing arithmetic, validated by property tests + visual ASCII
    # inspection (see raster_demo). The pure face *geometry* stays mutation-graded.
    "crates/jaxson-face/src/raster.rs",
]
